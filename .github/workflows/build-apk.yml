name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK (debug)
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/CaissePro.apk

      - name: Delete previous latest release
        run: gh release delete latest --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release (always)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: CaissePro - Derniere version
          files: android/app/build/outputs/apk/debug/CaissePro.apk
          body: |
            Derniere version de CaissePro APK.

            **Telecharger** : cliquez sur `CaissePro.apk` ci-dessous.

            Build: ${{ github.sha }}
            Date: ${{ github.event.head_commit.timestamp }}
          prerelease: false
          make_latest: true
