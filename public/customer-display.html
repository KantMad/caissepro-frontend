<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CaissePro - Ecran Client</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,-apple-system,sans-serif;background:#F8FAF7;overflow:hidden;height:100vh}
#root{height:100vh;display:flex;flex-direction:column}
.header{background:linear-gradient(135deg,#047857,#059669);color:#fff;padding:20px 30px;text-align:center}
.header h1{font-size:24px;font-weight:800}.header .sub{font-size:13px;opacity:0.8;margin-top:4px}
.customer-bar{background:#065F46;color:#fff;padding:10px 30px;display:flex;align-items:center;gap:12px}
.customer-bar .avatar{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
.customer-bar .info{flex:1}.customer-bar .name{font-weight:600;font-size:14px}.customer-bar .loyalty{font-size:11px;opacity:0.8}
.promos-bar{background:#FFFBEB;border-bottom:1px solid #FDE68A;padding:10px 30px;display:flex;flex-wrap:wrap;gap:8px}
.promo-tag{background:#FEF3C7;border:1px solid #F59E0B;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;color:#92400E}
.items{flex:1;overflow-y:auto;padding:20px 30px}
.item{display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid #E8ECE5;font-size:16px}
.item .name{font-weight:600;flex:1}.item .qty{color:#666;margin:0 20px}.item .price{font-weight:800;color:#047857;min-width:80px;text-align:right}
.discount-line{display:flex;justify-content:space-between;padding:8px 0;font-size:14px;color:#059669;font-style:italic}
.discount-line .label{flex:1}.discount-line .amount{font-weight:700}
.total-bar{background:#fff;border-top:3px solid #047857;padding:24px 30px;display:flex;justify-content:space-between;align-items:center}
.total-bar .label{font-size:20px;font-weight:700;color:#333}.total-bar .amount{font-size:36px;font-weight:900;color:#047857}
.screensaver{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#F8FAF7,#E8F0E3)}
.screensaver .logo{width:120px;height:120px;border-radius:30px;background:linear-gradient(135deg,#047857,#059669);display:flex;align-items:center;justify-content:center;color:#fff;font-size:48px;font-weight:900;margin-bottom:20px;box-shadow:0 12px 40px rgba(43,110,68,0.3)}
.screensaver h2{font-size:28px;font-weight:800;color:#333;margin-bottom:8px}
.screensaver p{font-size:16px;color:#666}
.screensaver .time{font-size:48px;font-weight:800;color:#047857;margin-top:20px}
.status{position:fixed;top:8px;right:8px;padding:4px 10px;border-radius:12px;font-size:9px;font-weight:700;opacity:0.6}
.status.connected{background:#D1FAE5;color:#065F46}
.status.polling{background:#FEF3C7;color:#92400E}
.status.api{background:#DBEAFE;color:#1E40AF}
.setup{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid #E5E7EB;padding:12px 20px;display:none;z-index:100}
.setup.visible{display:block}
.setup label{font-size:11px;font-weight:700;color:#666;display:block;margin-bottom:4px}
.setup input{width:100%;padding:8px 12px;border:1.5px solid #D1D5DB;border-radius:8px;font-size:13px;margin-bottom:8px}
.setup button{background:#047857;color:#fff;border:none;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
.setup .hint{font-size:10px;color:#999;margin-top:4px}
</style>
</head>
<body>
<div id="root">
  <div class="screensaver">
    <div class="logo">CP</div>
    <h2></h2>
    <p>Bienvenue</p>
    <div class="time"></div>
  </div>
</div>
<div id="status" class="status polling">En attente...</div>

<!-- Setup panel: shown on first use or triple-tap -->
<div id="setup" class="setup">
  <label>URL de l'API CaissePro</label>
  <input id="apiUrl" type="url" placeholder="https://votre-api.com" />
  <label>ID du magasin</label>
  <input id="storeId" type="text" placeholder="Ex: abc123..." />
  <label>Token ecran</label>
  <input id="displayToken" type="text" placeholder="Token genere dans Parametres > Ecran 2" />
  <button id="btnSave">Enregistrer et connecter</button>
  <div class="hint">Triple-tap sur l'ecran pour rouvrir ce panneau de configuration. Le token est disponible dans les parametres de CaissePro.</div>
</div>

<script>
var lastTs=0;
var apiUrl='';
var storeId='';
var displayToken='';
var apiActive=false;

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function updateTime(){var t=document.querySelector('.time');if(t)t.textContent=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});}
setInterval(updateTime,1000);updateTime();

function setStatus(cls,text){
  var st=document.getElementById('status');
  if(st){st.className='status '+cls;st.textContent=text;}
}

function updateCart(data){
  var root=document.getElementById('root');
  if(!data||!data.items||data.items.length===0){
    root.innerHTML='<div class="screensaver"><div class="logo">CP</div><h2></h2><p>'+(data&&data.customer?esc(data.customer.name)+', bienvenue !':'Bienvenue')+'</p><div class="time"></div></div>';
    var h2=root.querySelector('h2');if(h2)h2.textContent=data&&data.storeName||'';
    updateTime();return;
  }
  var html='<div class="header"><h1>'+esc(data.storeName)+'</h1><div class="sub">Votre panier</div></div>';
  if(data.customer){
    html+='<div class="customer-bar"><div class="avatar">'+esc(data.customer.name.charAt(0))+'</div><div class="info"><div class="name">'+esc(data.customer.name)+'</div>';
    if(data.customer.loyalty)html+='<div class="loyalty">'+esc(data.customer.loyalty)+'</div>';
    html+='</div></div>';
  }
  if(data.promos&&data.promos.length>0){
    html+='<div class="promos-bar">';
    data.promos.forEach(function(p){html+='<span class="promo-tag">'+esc(p)+'</span>';});
    html+='</div>';
  }
  html+='<div class="items">';
  data.items.forEach(function(i){
    html+='<div class="item"><span class="name">'+esc(i.name)+'</span><span class="qty">x'+esc(i.qty)+'</span><span class="price">'+esc(i.price)+'</span></div>';
  });
  if(data.appliedPromos&&data.appliedPromos.length>0){
    data.appliedPromos.forEach(function(a){html+='<div class="discount-line"><span class="label">'+esc(a)+'</span></div>';});
  }
  html+='</div>';
  html+='<div class="total-bar"><span class="label">Total TTC</span><span class="amount">'+esc(data.total)+'</span></div>';
  root.innerHTML=html;
}

// ══ Channel 1: API polling (primary for Sunmi APK — cross-process) ══
// SEC-02: Token required for API polling
function pollAPI(){
  if(!apiUrl||!storeId||!displayToken)return;
  fetch(apiUrl+'/api/customer-display/'+encodeURIComponent(storeId)+'?token='+encodeURIComponent(displayToken))
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(res){
      if(res&&res.data&&res.updatedAt>lastTs){
        lastTs=res.updatedAt;
        updateCart(res.data);
        setStatus('api','Connecte (API)');
        apiActive=true;
      }
    })
    .catch(function(e){
      if(apiActive){setStatus('polling','API indisponible...');apiActive=false;}
      if(e.message&&e.message.indexOf('401')>=0)setStatus('polling','Token invalide');
    });
}
setInterval(pollAPI,500);

// ══ Channel 2: BroadcastChannel (fast, same browser context) ══
try{
  var bc=new BroadcastChannel('caissepro_customer_display');
  bc.onmessage=function(e){
    updateCart(e.data);
    lastTs=e.data._ts||Date.now();
    setStatus('connected','Connecte (live)');
  };
}catch(e){}

// ══ Channel 3: localStorage polling (same browser, different tab) ══
setInterval(function(){
  try{
    var raw=localStorage.getItem('caissepro_customer_cart');
    if(!raw)return;
    var data=JSON.parse(raw);
    var ts=data._ts||0;
    if(ts>lastTs){
      lastTs=ts;
      updateCart(data);
      setStatus('connected','Connecte (sync)');
    }
  }catch(e){}
},600);

// ══ Channel 4: storage event ══
window.addEventListener('storage',function(e){
  if(e.key==='caissepro_customer_cart'&&e.newValue){
    try{
      var data=JSON.parse(e.newValue);
      var ts=data._ts||0;
      if(ts>lastTs){
        lastTs=ts;
        updateCart(data);
        setStatus('connected','Connecte (event)');
      }
    }catch(e){}
  }
});

// ══ Setup panel ══
function loadConfig(){
  try{
    apiUrl=localStorage.getItem('caissepro_display_api_url')||'';
    storeId=localStorage.getItem('caissepro_display_store_id')||'';
    displayToken=localStorage.getItem('caissepro_display_token')||'';
  }catch(e){}
  // Auto-detect from URL params
  if(!apiUrl){
    var params=new URLSearchParams(window.location.search);
    if(params.get('api'))apiUrl=params.get('api');
    if(params.get('store'))storeId=params.get('store');
    if(params.get('token'))displayToken=params.get('token');
  }
  document.getElementById('apiUrl').value=apiUrl;
  document.getElementById('storeId').value=storeId;
  document.getElementById('displayToken').value=displayToken;
  // Show setup if not configured
  if(!apiUrl||!storeId||!displayToken){
    document.getElementById('setup').className='setup visible';
  }
}

document.getElementById('btnSave').addEventListener('click',function(){
  apiUrl=document.getElementById('apiUrl').value.trim().replace(/\/$/,'');
  storeId=document.getElementById('storeId').value.trim();
  displayToken=document.getElementById('displayToken').value.trim();
  if(!apiUrl||!storeId||!displayToken){alert('Remplissez les trois champs (URL, ID magasin, Token)');return;}
  try{
    localStorage.setItem('caissepro_display_api_url',apiUrl);
    localStorage.setItem('caissepro_display_store_id',storeId);
    localStorage.setItem('caissepro_display_token',displayToken);
  }catch(e){}
  document.getElementById('setup').className='setup';
  setStatus('polling','Configuration sauvegardee. Connexion...');
  pollAPI();
});

// Triple-tap to open config
var tapCount=0;var tapTimer=null;
document.addEventListener('click',function(){
  tapCount++;
  if(tapTimer)clearTimeout(tapTimer);
  if(tapCount>=3){
    tapCount=0;
    var setup=document.getElementById('setup');
    setup.className=setup.className.indexOf('visible')>=0?'setup':'setup visible';
  }
  tapTimer=setTimeout(function(){tapCount=0;},600);
});

// Also expose globally for window.open fallback
window.updateCart=updateCart;

// Init
loadConfig();

// Load initial state from localStorage
try{
  var init=localStorage.getItem('caissepro_customer_cart');
  if(init){var d=JSON.parse(init);lastTs=d._ts||0;updateCart(d);}
}catch(e){}
</script>
</body>
</html>
